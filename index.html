:root{
 --bg:#f3f7fb;--card:#fff;--text:#182433;--muted:#657487;--border:#dbe5ee;
 --navy:#123d63;--blue:#1769aa;--green:#16834b;--greenSoft:#edf9f2;
 --amber:#a96f00;--amberSoft:#fff7df;--red:#c93636;--redSoft:#fff0f0;
 --input:#f9fbfd;--shadow:0 14px 40px rgba(25,55,85,.10)
}
body.dark{
 --bg:#101820;--card:#18232d;--text:#edf4fa;--muted:#9fb0bf;--border:#334554;
 --navy:#7db7e5;--blue:#58a7e4;--input:#202e3a;--shadow:0 14px 40px rgba(0,0,0,.28)
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),#eaf1f7);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
body.dark{background:var(--bg)}
.wrap{max-width:1180px;margin:24px auto;padding:0 14px 36px}
.app{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:22px}
.header{position:relative;display:flex;align-items:center;justify-content:center;min-height:76px;border-bottom:1px solid var(--border);padding-bottom:16px}
.brand{text-align:center}
.brand h1{margin:0;color:var(--navy);font-size:27px}
.brand p{margin:6px 0 0;color:var(--muted);font-weight:600}
.logo{position:absolute;left:0;font-weight:900;font-size:25px;color:var(--navy);letter-spacing:.04em}
.theme{position:absolute;right:0;border:1px solid var(--border);background:var(--input);color:var(--text);padding:9px 12px;border-radius:9px;cursor:pointer;font-weight:700}
.mode-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:18px 0}
.mode-tab{border:1px solid var(--border);background:var(--input);color:var(--text);padding:13px;border-radius:10px;font-weight:800;cursor:pointer}
.mode-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.section{margin-top:16px;padding:18px;border:1px solid var(--border);border-radius:15px;background:linear-gradient(135deg,var(--input),var(--card))}
.eyebrow{font-size:10px;font-weight:900;letter-spacing:.13em;color:var(--blue);margin-bottom:6px}
h2{margin:0 0 5px;color:var(--navy);font-size:21px}
.helper{color:var(--muted);font-size:13px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:15px}
.field label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--text)}
.field input,.field select{width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:15px}
.field small{display:block;color:var(--muted);font-size:10px;margin-top:5px;line-height:1.35}
.fixed-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.fixed{flex:1;min-width:145px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--card);display:flex;justify-content:space-between;align-items:center}
.fixed span{font-size:10px;color:var(--muted);font-weight:700}.fixed strong{font-size:14px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:13px 0}
.btn{border:0;padding:12px;border-radius:9px;font-weight:800;cursor:pointer}
.reset{background:var(--navy);color:#fff}.print{background:var(--blue);color:#fff}
.auto{text-align:center;color:var(--muted);font-size:12px;font-weight:700;margin-top:12px}
.decision{margin:16px 0 0;padding:18px;border:2px solid var(--border);border-radius:13px;text-align:center;font-size:22px;font-weight:900}
.decision small{display:block;font-size:14px;margin-top:6px}
.good{background:var(--greenSoft);border-color:var(--green);color:var(--green)}
.warn{background:var(--amberSoft);border-color:var(--amber);color:#795300}
.stop{background:var(--redSoft);border-color:var(--red);color:var(--red)}
.warning{display:none;margin-top:10px;padding:13px;border-radius:10px;background:var(--redSoft);border:1px solid var(--red);color:var(--red);font-weight:800}
.results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
.metric{padding:14px;border:1px solid var(--border);border-radius:11px;background:var(--card)}
.metric span{display:block;color:var(--muted);font-size:10px;font-weight:800}.metric strong{display:block;font-size:21px;margin-top:7px}
.metric.hero{border:2px solid var(--green);background:var(--greenSoft)}.metric.hero strong{font-size:28px;color:var(--green)}
.pitch{white-space:pre-line;line-height:1.7;padding:16px;border:1px solid var(--border);border-radius:11px;background:var(--card)}
.copy{margin-top:10px;background:var(--blue);color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:800;cursor:pointer}
details{margin-top:15px;border:1px solid var(--border);border-radius:12px;background:var(--input);overflow:hidden}
summary{padding:15px;font-weight:900;color:var(--navy);cursor:pointer}
.details{padding:0 15px 15px}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.hidden{display:none!important}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px;z-index:50}
.modal.show{display:flex}.modal-card{width:min(620px,96vw);background:var(--card);padding:22px;border-radius:16px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.results{grid-template-columns:repeat(3,1fr)}}
@media(max-width:620px){.header{padding-top:60px}.logo{top:5px}.theme{top:5px}.brand h1{font-size:21px}.mode-tabs{grid-template-columns:repeat(2,1fr)}.grid,.results{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}}
@media print{body{background:#fff}.theme,.actions,.auto,.mode-tabs,.copy{display:none!important}.app{box-shadow:none;border:0}.section,details{break-inside:avoid}details{display:block}details&gt;summary{display:none}.details{display:block!important}}

.business-tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 12px}
.business-tab{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:13px;background:var(--input);color:var(--text);cursor:pointer;text-align:left;transition:.2s}
.business-tab:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(20,60,100,.08)}

.business-tab b{display:block;font-size:16px}.business-tab small{display:block;margin-top:4px;opacity:.8;font-size:11px}

&lt;script&gt;
const $=id=&gt;document.getElementById(id);
const money=n=&gt;&#x27;$&#x27;+(Number(n)||0).toLocaleString(&#x27;en-US&#x27;,{minimumFractionDigits:2,maximumFractionDigits:2});
let mode=&#x27;w2&#x27;;
let business=&#x27;it&#x27;;

function setBusiness(b){
 business=b;
 document.querySelectorAll(&#x27;.business-tab&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;active&#x27;,x.dataset.business===b));
 $(&#x27;itTypeSelector&#x27;).classList.toggle(&#x27;hidden&#x27;,b!==&#x27;it&#x27;);
 document.querySelectorAll(&#x27;.healthcare-only&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;hidden&#x27;,b!==&#x27;healthcare&#x27;));
 if(b===&#x27;healthcare&#x27;){
   $(&#x27;msp&#x27;).value=6.5;
   $(&#x27;itRtrDetails&#x27;).classList.add(&#x27;hidden&#x27;);
   $(&#x27;messageHeading&#x27;).textContent=&#x27;📣 Candidate Pay Package Message&#x27;;
   $(&#x27;copyButtonText&#x27;).textContent=&#x27;Copy Candidate Message&#x27;;
   setMode(&#x27;travel&#x27;);
 }else{
   $(&#x27;msp&#x27;).value=2.5;
   $(&#x27;itRtrDetails&#x27;).classList.remove(&#x27;hidden&#x27;);
   $(&#x27;messageHeading&#x27;).textContent=&#x27;📄 Right to Represent (RTR)&#x27;;
   $(&#x27;copyButtonText&#x27;).textContent=&#x27;Copy RTR&#x27;;
   setMode(mode===&#x27;travel&#x27;?&#x27;w2&#x27;:mode);

}
function setMode(m){
 mode=m;
 document.querySelectorAll(&#x27;.employment-btn&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;active&#x27;,x.dataset.mode===m));
 document.querySelectorAll(&#x27;.travel-only&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;hidden&#x27;,m!==&#x27;travel&#x27;));
 if(business===&#x27;healthcare&#x27;) document.querySelectorAll(&#x27;.healthcare-only&#x27;).forEach(x=&gt;x.classList.remove(&#x27;hidden&#x27;));
 const burden=$(&#x27;burden&#x27;), hours=$(&#x27;hours&#x27;), pr=$(&#x27;pr&#x27;);
 if(m===&#x27;w2&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;W2&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;Pay + Burden&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;Taxable Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;TAXABLE PAY RATE&#x27;;burden.value=15;hours.value=40;pr.value=60; }
 if(m===&#x27;c2c&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;C2C&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;C2C Rate&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;C2C Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;C2C PAY RATE&#x27;;burden.value=0;hours.value=40;pr.value=70; }
 if(m===&#x27;1099&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;1099&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;Contractor Rate&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;1099 Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;1099 PAY RATE&#x27;;burden.value=0;hours.value=40;pr.value=65; }
 if(m===&#x27;travel&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;Healthcare Travel&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;Taxable + Stipend&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;Taxable Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;TAXABLE PAY RATE&#x27;;burden.value=15;hours.value=36;pr.value=37; }
 calculate();
}
function toggleOT(){
 document.querySelectorAll(&#x27;.ot-field&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;hidden&#x27;,$(&#x27;otMode&#x27;).value===&#x27;none&#x27;));
 if($(&#x27;otMode&#x27;).value===&#x27;none&#x27;) $(&#x27;otHours&#x27;).value=0;
 if($(&#x27;otMode&#x27;).value===&#x27;premium&#x27;) $(&#x27;clientOtMult&#x27;).value=1.5;
 if($(&#x27;otMode&#x27;).value===&#x27;straight&#x27;) $(&#x27;clientOtMult&#x27;).value=1;
 if($(&#x27;otMode&#x27;).value===&#x27;unpaid&#x27;) $(&#x27;clientOtMult&#x27;).value=0;
 calculate();
}
function calculate(){
 const br=+$(&#x27;br&#x27;).value||0, pr=+$(&#x27;pr&#x27;).value||0, hrs=+$(&#x27;hours&#x27;).value||0, tenure=+$(&#x27;tenure&#x27;).value||0;
 const msp=+$(&#x27;msp&#x27;).value||0, burdenPct=+$(&#x27;burden&#x27;).value||0, ops=+$(&#x27;ops&#x27;).value||0, desired=+$(&#x27;desired&#x27;).value||0;
 const stipend=mode===&#x27;travel&#x27;?(+$(&#x27;stipend&#x27;).value||0):0;
 const otHours=+$(&#x27;otHours&#x27;).value||0, otMult=+$(&#x27;otMult&#x27;).value||1.5, clientMult=+$(&#x27;clientOtMult&#x27;).value||0;
 const mspHr=br*msp/100, netBr=br-mspHr, burdenHr=pr*burdenPct/100, stipendHr=hrs?stipend/hrs:0;
 const totalCostHr=pr+burdenHr+stipendHr;
 const grossMargin=netBr-totalCostHr, netMargin=grossMargin-ops, netPct=netBr?netMargin/netBr*100:0;
 const candOtBase=pr*otMult*(1+burdenPct/100);
 const clientOtRevenue=br*clientMult*(1-msp/100);
 const otMarginHr=clientOtRevenue-candOtBase-ops;
 const weeklyMargin=netMargin*hrs+(otHours?otMarginHr*otHours:0);
 const contractMargin=weeklyMargin*tenure;
 const weeklyPackage=pr*hrs+stipend+(otHours?pr*otMult*otHours:0);
 const contractEarnings=weeklyPackage*tenure;
 const contractRevenue=(netBr*hrs+clientOtRevenue*otHours)*tenure;
 const contractCost=((totalCostHr*hrs)+(candOtBase*otHours))*tenure;
 const divisor=1+burdenPct/100;
 const maxPay=Math.max(0,(netBr-ops-desired-stipendHr)/divisor);

 $(&#x27;netMargin&#x27;).textContent=money(netMargin);
 $(&#x27;grossMargin&#x27;).textContent=money(grossMargin);
 $(&#x27;netPct&#x27;).textContent=netPct.toFixed(2)+&#x27;%&#x27;;
 $(&#x27;weeklyMargin&#x27;).textContent=money(weeklyMargin);
 $(&#x27;contractMargin&#x27;).textContent=money(contractMargin);
 $(&#x27;mspHr&#x27;).textContent=money(mspHr);$(&#x27;mspCalcNote&#x27;).textContent=msp.toFixed(2)+&#x27;% of Bill Rate&#x27;;$(&#x27;netBr&#x27;).textContent=money(netBr);$(&#x27;burdenHr&#x27;).textContent=money(burdenHr);
 $(&#x27;stipendHr&#x27;).textContent=money(stipendHr);$(&#x27;totalCostHr&#x27;).textContent=money(totalCostHr);$(&#x27;maxPay&#x27;).textContent=money(maxPay)+&#x27;/hr&#x27;;
 $(&#x27;contractRevenue&#x27;).textContent=money(contractRevenue);$(&#x27;contractCost&#x27;).textContent=money(contractCost);
 $(&#x27;rPay&#x27;).textContent=money(pr)+&#x27;/hr&#x27;;$(&#x27;rStipend&#x27;).textContent=money(stipend);$(&#x27;rWeekly&#x27;).textContent=money(weeklyPackage);
 $(&#x27;rHours&#x27;).textContent=hrs.toFixed(0)+&#x27; hours&#x27;;$(&#x27;rTenure&#x27;).textContent=tenure.toFixed(0)+&#x27; weeks&#x27;;$(&#x27;rContract&#x27;).textContent=money(contractEarnings);

 const d=$(&#x27;decision&#x27;);
 if(netMargin&gt;=7){d.className=&#x27;decision good&#x27;;d.innerHTML=&#x27;✅ PROCEED — Healthy Margin&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}
 else if(netMargin&gt;=5){d.className=&#x27;decision warn&#x27;;d.innerHTML=&#x27;⚠️ MANAGER APPROVAL REQUIRED&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}
 else{d.className=&#x27;decision stop&#x27;;d.innerHTML=&#x27;⛔ DO NOT PROCEED — Margin Below Minimum&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}

 const ow=$(&#x27;otWarning&#x27;);
 if(otHours&gt;0 &amp;&amp; otMarginHr&lt;0){ow.style.display=&#x27;block&#x27;;ow.innerHTML=&#x27;⚠️ OT MARGIN WARNING — Each OT hour reduces margin by &#x27;+money(Math.abs(otMarginHr))+&#x27;. Weekly OT impact at &#x27;+otHours+&#x27; hours: -&#x27;+money(Math.abs(otMarginHr*otHours))+&#x27;.&#x27;}
 else if(otHours&gt;0 &amp;&amp; $(&#x27;otMode&#x27;).value!==&#x27;premium&#x27;){ow.style.display=&#x27;block&#x27;;ow.innerHTML=&#x27;⚠️ OT REVIEW — Candidate OT cost is &#x27;+money(candOtBase)+&#x27;/hr while client OT revenue is &#x27;+money(clientOtRevenue)+&#x27;/hr. OT margin impact: &#x27;+money(otMarginHr)+&#x27;/hr.&#x27;}
 else{ow.style.display=&#x27;none&#x27;;ow.innerHTML=&#x27;&#x27;}

 let pitch;
 if(mode===&#x27;travel&#x27;){
  pitch=`Hi,\n\nThe pay package for this opportunity is:\n\n• Taxable Pay: ${money(pr)}/hour on W2\n• Weekly Non-Taxable Stipend: ${money(stipend)}*\n• Gross Weekly Package: ${money(weeklyPackage)} based on ${hrs.toFixed(0)} regular hours/week\n• Assignment Duration: ${tenure.toFixed(0)} weeks\n• Estimated Gross Contract Earnings: ${money(contractEarnings)}\n\nPlease let me know if this package works for you and we can discuss the next steps.\n\n*Non-taxable stipend is available to eligible travelers based on applicable tax-home and assignment requirements.`;
 } else {
  const type=mode===&#x27;w2&#x27;?&#x27;W2&#x27;:mode===&#x27;c2c&#x27;?&#x27;C2C&#x27;:&#x27;1099&#x27;;
  const fullName=($(&#x27;rtrCandidateName&#x27;).value||&#x27;[Candidate Full Legal Name]&#x27;).trim();
  const clientName=($(&#x27;rtrClientName&#x27;).value||&#x27;[Client Name]&#x27;).trim();
  pitch=`Right to Represent (RTR)\n\nI, ${fullName}, hereby authorize Siri InfoSolutions Inc. to represent and submit my profile for the opportunity with ${clientName} at a pay rate of ${money(pr)}/hour on ${type}.\n\nI confirm that I have not authorized any other staffing agency or recruiter to represent or submit my profile for the same position with ${clientName}. I will not authorize any other agency or recruiter to submit my profile for this same position after providing this authorization.\n\nI confirm that the information provided in my resume and during the recruitment process is accurate to the best of my knowledge.\n\nFull Legal Name: ${fullName}\nClient Name: ${clientName}\nPay Rate: ${money(pr)}/hour on ${type}\n\nPlease reply with “I Agree” to confirm this Right to Represent authorization.`;
 }
 $(&#x27;pitch&#x27;).textContent=pitch;
}
function copyPitch(){navigator.clipboard.writeText($(&#x27;pitch&#x27;).textContent).then(()=&gt;{$(&#x27;copyStatus&#x27;).textContent=&#x27; Copied!&#x27;;setTimeout(()=&gt;$(&#x27;copyStatus&#x27;).textContent=&#x27;&#x27;,1600)})}
function resetCalc(){
  // Common defaults
  $(&#x27;br&#x27;).value=90;
  $(&#x27;hours&#x27;).value=business===&#x27;healthcare&#x27;?36:40;
  $(&#x27;tenure&#x27;).value=13;

  $(&#x27;burden&#x27;).value=(business===&#x27;healthcare&#x27;||mode===&#x27;w2&#x27;)?15:0;
  $(&#x27;ops&#x27;).value=2;
  $(&#x27;desired&#x27;).value=5;
  $(&#x27;otMode&#x27;).value=&#x27;none&#x27;;
  $(&#x27;otHours&#x27;).value=0;
  $(&#x27;otMult&#x27;).value=1.5;
  $(&#x27;clientOtMult&#x27;).value=1.5;
  $(&#x27;stipend&#x27;).value=1240;
  if($(&#x27;rtrCandidateName&#x27;)) $(&#x27;rtrCandidateName&#x27;).value=&#x27;&#x27;;
  if($(&#x27;rtrClientName&#x27;)) $(&#x27;rtrClientName&#x27;).value=&#x27;&#x27;;
  if($(&#x27;candidateName&#x27;)) $(&#x27;candidateName&#x27;).value=&#x27;&#x27;;
  if($(&#x27;clientName&#x27;)) $(&#x27;clientName&#x27;).value=&#x27;&#x27;;

  if(business===&#x27;healthcare&#x27;){
    mode=&#x27;travel&#x27;;
    $(&#x27;pr&#x27;).value=37;
    document.querySelectorAll(&#x27;.travel-only&#x27;).forEach(x=&gt;x.classList.remove(&#x27;hidden&#x27;));
    document.querySelectorAll(&#x27;.healthcare-only&#x27;).forEach(x=&gt;x.classList.remove(&#x27;hidden&#x27;));
  }else{
    if(mode===&#x27;travel&#x27;) mode=&#x27;w2&#x27;;
    if(mode===&#x27;w2&#x27;) $(&#x27;pr&#x27;).value=60;
    if(mode===&#x27;c2c&#x27;) $(&#x27;pr&#x27;).value=70;
    if(mode===&#x27;1099&#x27;) $(&#x27;pr&#x27;).value=65;
    document.querySelectorAll(&#x27;.travel-only&#x27;).forEach(x=&gt;x.classList.add(&#x27;hidden&#x27;));
    document.querySelectorAll(&#x27;.healthcare-only&#x27;).forEach(x=&gt;x.classList.add(&#x27;hidden&#x27;));
    document.querySelectorAll(&#x27;.employment-btn&#x27;).forEach(x=&gt;x.classList.toggle(&#x27;active&#x27;,x.dataset.mode===mode));
  }
  document.querySelectorAll(&#x27;.ot-field&#x27;).forEach(x=&gt;x.classList.add(&#x27;hidden&#x27;));
  calculate();
}

const $=id=&gt;document.getElementById(id), num=id=&gt;parseFloat($(id).value)||0, money=x=&gt;&#x27;$&#x27;+x.toFixed(2);
function openPrintDialog(){
  let pc=$(&#x27;printCandidateName&#x27;), pl=$(&#x27;printClientName&#x27;);
  if(pc &amp;&amp; !$(&#x27;candidateName&#x27;).value) pc.value=&#x27;&#x27;;
  if(pl &amp;&amp; !$(&#x27;clientName&#x27;).value) pl.value=&#x27;&#x27;;
  $(&#x27;printValidation&#x27;).style.display=&#x27;none&#x27;;
  $(&#x27;printDialog&#x27;).classList.add(&#x27;show&#x27;);
  $(&#x27;printDialog&#x27;).setAttribute(&#x27;aria-hidden&#x27;,&#x27;false&#x27;);
  setTimeout(()=&gt;pc.focus(),50);
}
function closePrintDialog(){
  $(&#x27;printDialog&#x27;).classList.remove(&#x27;show&#x27;);
  $(&#x27;printDialog&#x27;).setAttribute(&#x27;aria-hidden&#x27;,&#x27;true&#x27;);
}
function prepareAndPrint(){
  let candidate=$(&#x27;printCandidateName&#x27;).value.trim();
  let client=$(&#x27;printClientName&#x27;).value.trim();
  let pv=$(&#x27;printValidation&#x27;);
  let errors=[];
  if(!candidate) errors.push(&#x27;Candidate Name is required for the PDF.&#x27;);
  if(!client) errors.push(&#x27;Facility / Client Name is required for the PDF.&#x27;);
  if(errors.length){
    pv.style.display=&#x27;block&#x27;;
    pv.innerHTML=&#x27;⛔ &#x27;+errors.join(&#x27;&lt;br&gt;⛔ &#x27;);
    return;
  }
  pv.style.display=&#x27;none&#x27;;
  $(&#x27;candidateName&#x27;).value=candidate;
  $(&#x27;clientName&#x27;).value=client;
  $(&#x27;printCandidateDisplay&#x27;).textContent=candidate;
  $(&#x27;printClientDisplay&#x27;).textContent=client;
  if($(&#x27;printGeneratedDate&#x27;)) $(&#x27;printGeneratedDate&#x27;).textContent=&#x27;Generated &#x27;+new Date().toLocaleString();
  calculate();

  // Open every minimized section so all content is included in print/PDF.
  let detailsEls=[...document.querySelectorAll(&#x27;details&#x27;)];
  let previousStates=detailsEls.map(d=&gt;d.open);
  detailsEls.forEach(d=&gt;d.open=true);

  closePrintDialog();
  setTimeout(()=&gt;{
    window.print();
    setTimeout(()=&gt;{
      detailsEls.forEach((d,i)=&gt;d.open=previousStates[i]);
    },300);
  },180);
}

function updateHealthcareRTR(){
  const fullName=($(&#x27;hcRtrCandidate&#x27;).value||&#x27;[Candidate Full Legal Name]&#x27;).trim();
  const clientName=($(&#x27;hcRtrClient&#x27;).value||&#x27;[Facility / Client Name]&#x27;).trim();
  const pr=num(&#x27;pr&#x27;), stipend=num(&#x27;stipend&#x27;), hrs=num(&#x27;hours&#x27;), tenure=num(&#x27;tenure&#x27;)||13;
  const grossWeekly=pr*hrs+stipend;
  const txt=`Right to Represent (RTR)

I, ${fullName}, authorize Siri InfoSolutions Inc. / Siri HealthCare Services Inc. to represent and submit my profile for the healthcare staffing opportunity with ${clientName}.

The pay package discussed with me is:

• Taxable Pay: ${money(pr)}/hour on W2
• Weekly Non-Taxable Stipend: ${money(stipend)}*
• Gross Weekly Package: ${money(grossWeekly)} based on ${hrs.toFixed(0)} regular hours/week
• Assignment Duration: ${tenure.toFixed(0)} weeks

I confirm that I have not authorized any other staffing agency or recruiter to represent or submit my profile for the same position with ${clientName}. I will not authorize another agency or recruiter to submit my profile for this same position after providing this authorization.

I confirm that the information provided in my resume and during the recruitment process is accurate to the best of my knowledge.

Full Legal Name: ${fullName}
Facility / Client: ${clientName}

Please reply with “I Agree” to confirm this Right to Represent authorization.

*Non-taxable stipend is available to eligible travelers based on applicable tax-home and assignment requirements.`;
  $(&#x27;hcRtrText&#x27;).textContent=txt;
}
function copyHealthcareRTR(){
  const fullName=$(&#x27;hcRtrCandidate&#x27;).value.trim();
  const clientName=$(&#x27;hcRtrClient&#x27;).value.trim();
  if(!fullName||!clientName){
    $(&#x27;hcRtrCopyStatus&#x27;).textContent=&#x27;Enter Candidate Full Legal Name and Facility / Client Name before copying.&#x27;;
    return;
  }
  navigator.clipboard.writeText($(&#x27;hcRtrText&#x27;).textContent).then(()=&gt;{
    $(&#x27;hcRtrCopyStatus&#x27;).textContent=&#x27;RTR copied!&#x27;;
    setTimeout(()=&gt;$(&#x27;hcRtrCopyStatus&#x27;).textContent=&#x27;&#x27;,1800);
  });
}

function syncOTMode(){
let mode=$(&#x27;otMode&#x27;).value;
let wrap=$(&#x27;otHoursWrap&#x27;);
let cb=$(&#x27;clientPaysOT&#x27;);
if(mode===&#x27;none&#x27;){
 wrap.style.display=&#x27;none&#x27;;
 $(&#x27;otHours&#x27;).value=&#x27;&#x27;;
 cb.checked=false;
}else{
 wrap.style.display=&#x27;block&#x27;;
 cb.checked=(mode===&#x27;paid&#x27;);
}
calculate();
}
